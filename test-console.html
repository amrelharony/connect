<!DOCTYPE html>
<html>
<head>
    <title>Console Error Checker</title>
    <style>
        body { font-family: monospace; padding: 20px; background: #1e1e1e; color: #d4d4d4; }
        .error { color: #f48771; margin: 10px 0; padding: 10px; background: #2d2d2d; border-left: 3px solid #f48771; }
        .warning { color: #dcdcaa; margin: 10px 0; padding: 10px; background: #2d2d2d; border-left: 3px solid #dcdcaa; }
        .info { color: #4fc1ff; margin: 10px 0; padding: 10px; background: #2d2d2d; border-left: 3px solid #4fc1ff; }
        .success { color: #4ec9b0; margin: 10px 0; padding: 10px; background: #2d2d2d; border-left: 3px solid #4ec9b0; }
        h1 { color: #4fc1ff; }
        #results { margin-top: 20px; }
    </style>
</head>
<body>
    <h1>Console Error Checker for localhost:8765</h1>
    <div id="results"></div>
    <iframe id="testFrame" src="http://localhost:8765" style="width:1px;height:1px;border:none;position:absolute;left:-9999px;"></iframe>
    
    <script>
        const results = document.getElementById('results');
        const errors = [];
        const warnings = [];
        const logs = [];
        
        // Capture console errors
        const originalError = console.error;
        console.error = function(...args) {
            errors.push(args.join(' '));
            originalError.apply(console, args);
        };
        
        const originalWarn = console.warn;
        console.warn = function(...args) {
            warnings.push(args.join(' '));
            originalWarn.apply(console, args);
        };
        
        const originalLog = console.log;
        console.log = function(...args) {
            logs.push(args.join(' '));
            originalLog.apply(console, args);
        };
        
        // Listen for errors
        window.addEventListener('error', function(e) {
            errors.push(`${e.message} at ${e.filename}:${e.lineno}:${e.colno}`);
        });
        
        window.addEventListener('unhandledrejection', function(e) {
            errors.push(`Unhandled Promise Rejection: ${e.reason}`);
        });
        
        // Wait for iframe to load
        setTimeout(() => {
            results.innerHTML = '<div class="info">Checking for errors...</div>';
            
            setTimeout(() => {
                if (errors.length === 0 && warnings.length === 0) {
                    results.innerHTML = '<div class="success">✓ No JavaScript errors detected!</div>';
                } else {
                    let html = '';
                    
                    if (errors.length > 0) {
                        html += '<h2 style="color:#f48771;">Errors:</h2>';
                        errors.forEach(err => {
                            html += `<div class="error">${err}</div>`;
                        });
                    }
                    
                    if (warnings.length > 0) {
                        html += '<h2 style="color:#dcdcaa;">Warnings:</h2>';
                        warnings.forEach(warn => {
                            html += `<div class="warning">${warn}</div>`;
                        });
                    }
                    
                    results.innerHTML = html;
                }
            }, 3000);
        }, 1000);
    </script>
</body>
</html>
